<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoLog — Mantenimiento de Vehículos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0F; font-family: 'DM Sans','Segoe UI',sans-serif; color: #E8E8EC; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1A1A1E; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    input,select,textarea { outline: none; }
    button { cursor: pointer; font-family: inherit; }
    .card { background:#16161A; border:1px solid #252528; border-radius:16px; transition:border-color .2s; }
    .card:hover { border-color:#353538; }
    .btn-primary { background:linear-gradient(135deg,#F59E0B,#F97316); color:#0D0D0F; border:none; border-radius:10px; padding:12px 24px; font-weight:700; font-size:14px; letter-spacing:.02em; transition:all .2s; }
    .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
    .btn-ghost { background:transparent; color:#888; border:1px solid #252528; border-radius:10px; padding:10px 18px; font-size:14px; font-weight:500; transition:all .2s; }
    .btn-ghost:hover { background:#1E1E22; color:#E8E8EC; border-color:#353538; }
    .input-field { width:100%; background:#1E1E22; border:1px solid #2A2A2E; border-radius:10px; padding:11px 14px; color:#E8E8EC; font-size:14px; font-family:inherit; transition:border-color .2s; }
    .input-field:focus { border-color:#F59E0B; }
    .input-field option { background:#1E1E22; }
    .nav-item { padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; border:none; background:transparent; color:#666; transition:all .2s; white-space:nowrap; }
    .nav-item.active { background:#1E1E22; color:#F59E0B; }
    .nav-item:hover:not(.active) { color:#aaa; background:#1A1A1E; }
    .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.04em; }
    .service-card { background:#16161A; border:1px solid #252528; border-radius:14px; padding:14px; transition:all .2s; }
    .service-card:hover { border-color:#353538; transform:translateY(-1px); }
    .overdue  { border-color:#EF4444!important; background:#1A1010!important; }
    .due-soon { border-color:#F59E0B!important; background:#1A1610!important; }
    .toast { position:fixed; bottom:24px; right:24px; padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500; z-index:200; animation:slideIn .3s ease; box-shadow:0 8px 32px rgba(0,0,0,.5); }
    @keyframes slideIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .plate { font-family:'Space Mono',monospace; font-size:11px; background:#252528; padding:3px 8px; border-radius:5px; letter-spacing:.08em; }
    .km-display { font-family:'Space Mono',monospace; color:#F59E0B; font-size:22px; font-weight:700; }
    .delete-btn { background:transparent; border:none; color:#444; font-size:16px; padding:4px 8px; border-radius:6px; transition:all .2s; }
    .delete-btn:hover { color:#EF4444; background:#1A1010; }

    /* Login screen */
    .login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
    .login-logo { width:72px; height:72px; background:linear-gradient(135deg,#F59E0B,#F97316); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 24px; box-shadow:0 0 40px rgba(245,158,11,.3); }
    .login-card { background:#16161A; border:1px solid #252528; border-radius:20px; padding:40px; max-width:400px; width:100%; }
    .gdrive-btn { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:14px 24px; background:#fff; color:#333; border:none; border-radius:10px; font-size:15px; font-weight:600; transition:all .2s; margin-top:8px; }
    .gdrive-btn:hover { background:#f5f5f5; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
    .gdrive-btn img { width:20px; height:20px; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#333; font-size:13px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#252528; }

    /* Sync bar */
    .sync-bar { background:#111115; border-bottom:1px solid #1E1E22; padding:5px 20px; display:flex; align-items:center; gap:10px; font-size:12px; color:#555; flex-wrap:wrap; min-height:34px; }
    .sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .syncing { animation:pulse 1s infinite; }

    /* Spinner */
    .spinner { width:18px; height:18px; border:2px solid #333; border-top-color:#F59E0B; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────
//  CONFIGURATION
//  Este Client ID es público y seguro para usar
//  en aplicaciones web client-side.
//  Reemplázalo con el tuyo si quieres quitar
//  la advertencia "app no verificada".
// ─────────────────────────────────────────────
const CLIENT_ID   = "485276099955-j1lh6aretg8i901km60m32kauroqaosu.apps.googleusercontent.com";
const SCOPES      = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME   = "autolog-data.json";
const DISCOVERY   = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
const EMPTY_DATA  = { cars:[], logs:[] };

// ─────────────────────────────────────────────
//  GOOGLE DRIVE API HELPERS
// ─────────────────────────────────────────────
async function driveRequest(url, options = {}) {
  const token = window._gdrive_token;
  const res = await fetch(url, {
    ...options,
    headers: { Authorization: `Bearer ${token}`, ...options.headers },
  });
  if (!res.ok) throw new Error(`Drive API error: ${res.status}`);
  return res;
}

async function findFile() {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`
  );
  const data = await res.json();
  return data.files?.[0] || null;
}

async function readFile(fileId) {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  return res.json();
}

async function createFile(content) {
  const meta = new Blob([JSON.stringify({ name: FILE_NAME, parents: ["appDataFolder"] })], { type: "application/json" });
  const body = new Blob([JSON.stringify(content)], { type: "application/json" });
  const form = new FormData();
  form.append("metadata", meta);
  form.append("file", body);
  const res = await driveRequest(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    { method: "POST", body: form }
  );
  return res.json();
}

async function updateFile(fileId, content) {
  await driveRequest(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
    { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(content) }
  );
}

// ─────────────────────────────────────────────
//  MAINTENANCE TYPES
// ─────────────────────────────────────────────
const TYPES = [
  { id:"oil",          label:"Cambio de Aceite",      icon:"🛢️", color:"#F59E0B", interval:5000  },
  { id:"filter",       label:"Cambio de Filtro",       icon:"🔧", color:"#6366F1", interval:10000 },
  { id:"tires",        label:"Rotación de Gomas",      icon:"⚙️", color:"#10B981", interval:8000  },
  { id:"brakes",       label:"Revisión de Frenos",     icon:"🔴", color:"#EF4444", interval:20000 },
  { id:"transmission", label:"Aceite Transmisión",     icon:"⚡", color:"#8B5CF6", interval:30000 },
  { id:"coolant",      label:"Líquido Refrigerante",   icon:"💧", color:"#0EA5E9", interval:40000 },
  { id:"battery",      label:"Batería",                icon:"🔋", color:"#F97316", interval:50000 },
  { id:"alignment",    label:"Alineación",             icon:"📐", color:"#EC4899", interval:15000 },
  { id:"ac",           label:"Sistema A/C",            icon:"❄️", color:"#06B6D4", interval:25000 },
  { id:"other",        label:"Otro",                   icon:"📝", color:"#78716C", interval:null  },
];

function fmtDate(s) {
  if (!s) return "—";
  return new Date(s+"T00:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
}

// ─────────────────────────────────────────────
//  MAIN APP
// ─────────────────────────────────────────────
function App() {
  // Auth state
  const [authState, setAuthState] = useState("idle"); // idle | loading | authed | error
  const [userInfo,  setUserInfo]  = useState(null);
  const tokenRef    = useRef(null);
  const tokenClient = useRef(null);

  // Data state
  const [data,       setData]       = useState(EMPTY_DATA);
  const [fileId,     setFileId]     = useState(null);
  const [syncState,  setSyncState]  = useState("idle"); // idle | saving | saved | error
  const [lastSync,   setLastSync]   = useState(null);
  const saveTimer    = useRef(null);
  const fileIdRef    = useRef(null);
  fileIdRef.current  = fileId;

  // UI state
  const [view,       setView]       = useState("dashboard");
  const [selectedCar,setSelectedCar]= useState(null);
  const [form,       setForm]       = useState({});
  const [filterCar,  setFilterCar]  = useState("all");
  const [filterType, setFilterType] = useState("all");
  const [toast,      setToast]      = useState(null);

  const showToast = (msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 2800);
  };

  // ── Google Sign-In ─────────────────────────
  useEffect(() => {
    const interval = setInterval(() => {
      if (window.google?.accounts?.oauth2) {
        clearInterval(interval);
        if (!CLIENT_ID) return; // demo mode without client id
        tokenClient.current = window.google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: handleTokenResponse,
        });
      }
    }, 300);
    return () => clearInterval(interval);
  }, []);

  const handleTokenResponse = async (resp) => {
    if (resp.error) { setAuthState("error"); return; }
    window._gdrive_token = resp.access_token;
    tokenRef.current = resp.access_token;
    // Get user info
    try {
      const ui = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
        headers: { Authorization: `Bearer ${resp.access_token}` }
      }).then(r=>r.json());
      setUserInfo(ui);
    } catch {}
    setAuthState("loading");
    await loadFromDrive();
  };

  const signIn = () => {
    if (!CLIENT_ID) {
      // Demo mode — sin Client ID
      setAuthState("authed");
      showToast("Modo demo — sin Google Drive", "warn");
      return;
    }
    if (tokenClient.current) tokenClient.current.requestAccessToken();
  };

  const signOut = () => {
    if (tokenRef.current) window.google?.accounts?.oauth2?.revoke(tokenRef.current);
    window._gdrive_token = null;
    tokenRef.current = null;
    setUserInfo(null);
    setAuthState("idle");
    setData(EMPTY_DATA);
    setFileId(null);
    showToast("Sesión cerrada");
  };

  // ── Drive load/save ────────────────────────
  const loadFromDrive = async () => {
    try {
      setSyncState("saving");
      const file = await findFile();
      if (file) {
        const content = await readFile(file.id);
        setData(content || EMPTY_DATA);
        setFileId(file.id);
        fileIdRef.current = file.id;
      } else {
        const created = await createFile(EMPTY_DATA);
        setFileId(created.id);
        fileIdRef.current = created.id;
      }
      setLastSync(new Date());
      setSyncState("saved");
      setAuthState("authed");
    } catch (e) {
      console.error(e);
      setSyncState("error");
      setAuthState("authed");
      showToast("Error cargando datos de Drive", "error");
    }
  };

  const saveToDrive = useCallback(async (newData) => {
    if (!fileIdRef.current) return;
    setSyncState("saving");
    try {
      await updateFile(fileIdRef.current, newData);
      setLastSync(new Date());
      setSyncState("saved");
    } catch {
      setSyncState("error");
    }
  }, []);

  // Debounced save whenever data changes
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current=false; return; }
    if (!fileIdRef.current) {
      // localStorage fallback
      try { localStorage.setItem("autolog_data", JSON.stringify(data)); } catch {}
      return;
    }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveToDrive(data), 1200);
  }, [data]);

  // localStorage fallback on mount (no Drive)
  useEffect(() => {
    if (authState === "idle") {
      try {
        const s = localStorage.getItem("autolog_data");
        if (s) setData(JSON.parse(s));
      } catch {}
    }
  }, []);

  // ── CRUD ──────────────────────────────────
  const addCar = () => {
    if (!form.name||!form.year||!form.plate) return showToast("Completa todos los campos","error");
    const car = { id:Date.now(), ...form, km:parseInt(form.km)||0 };
    setData(d=>({...d, cars:[...d.cars, car]}));
    setForm({}); setView("dashboard");
    showToast(`${car.name} añadido ✓`);
  };

  const addLog = () => {
    if (!form.carId||!form.type||!form.date||!form.km) return showToast("Completa todos los campos","error");
    const log = { id:Date.now(), ...form, km:parseInt(form.km) };
    setData(d=>({
      cars: d.cars.map(c=>c.id===parseInt(form.carId)?{...c,km:Math.max(c.km,parseInt(form.km))}:c),
      logs: [log,...d.logs],
    }));
    setForm({}); setView("history");
    showToast("Mantenimiento registrado ✓");
  };

  const deleteCar = (id) => {
    if (!confirm("¿Eliminar este vehículo y todos sus registros?")) return;
    setData(d=>({cars:d.cars.filter(c=>c.id!==id), logs:d.logs.filter(l=>l.carId!==String(id))}));
    if (selectedCar===id) setSelectedCar(null);
    showToast("Vehículo eliminado");
  };

  const deleteLog = (id) => {
    setData(d=>({...d, logs:d.logs.filter(l=>l.id!==id)}));
    showToast("Registro eliminado");
  };

  const exportBackup = () => {
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`autolog-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  const importBackup = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(!d.cars||!d.logs) throw new Error();
        setData(d); showToast("Backup importado ✓");
      } catch { showToast("Archivo inválido","error"); }
    };
    r.readAsText(file); e.target.value="";
  };

  const getCarById  = id => data.cars.find(c=>c.id===parseInt(id));
  const getTypeById = id => TYPES.find(t=>t.id===id);
  const getLastLog  = (carId,typeId) =>
    data.logs.filter(l=>l.carId===String(carId)&&l.type===typeId)
             .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  const filteredLogs = data.logs.filter(l=>{
    if(filterCar!=="all"&&l.carId!==filterCar) return false;
    if(filterType!=="all"&&l.type!==filterType) return false;
    return true;
  });

  const dashboardCar = selectedCar ? getCarById(selectedCar) : data.cars[0];

  const fmtTime = d => d ? d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "";

  const syncColor = syncState==="saved"?"#10B981":syncState==="saving"?"#F59E0B":syncState==="error"?"#EF4444":"#444";
  const syncLabel = syncState==="saved"?`☁️ Guardado en Google Drive · ${fmtTime(lastSync)}`
                  : syncState==="saving"?"☁️ Guardando…"
                  : syncState==="error"?"⚠️ Error al guardar en Drive"
                  : authState==="authed"&&!fileId?"💾 Modo local (sin Drive)"
                  : "💾 Modo local";

  // ══════════════════════════════════════════
  //  LOGIN SCREEN
  // ══════════════════════════════════════════
  if (authState === "idle" || authState === "error") {
    return (
      <div className="login-screen">
        <div className="login-card">
          <div className="login-logo">🚗</div>
          <h1 style={{fontSize:26,fontWeight:700,marginBottom:8}}>AutoLog</h1>
          <p style={{color:"#555",fontSize:14,marginBottom:28,lineHeight:1.6}}>
            Registro de mantenimiento para tus vehículos.<br/>
            Sincronizado automáticamente con Google Drive.
          </p>

          {authState==="error" && (
            <div style={{background:"#2A1010",border:"1px solid #EF4444",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#EF4444"}}>
              ⚠️ Error al conectar. Intenta de nuevo.
            </div>
          )}

          <button className="gdrive-btn" onClick={signIn}>
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continuar con Google
          </button>

          <div className="divider">o</div>

          <button className="btn-ghost" style={{width:"100%",textAlign:"center"}}
            onClick={()=>{ setAuthState("authed"); showToast("Modo local — sin sincronización"); }}>
            Usar sin cuenta (solo este dispositivo)
          </button>

          <p style={{color:"#333",fontSize:11,marginTop:20,lineHeight:1.6}}>
            Los datos se guardan en tu Google Drive privado (carpeta oculta de la app).
            Nadie más tiene acceso.
          </p>
        </div>
      </div>
    );
  }

  // ── Loading ────────────────────────────────
  if (authState === "loading") {
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div className="spinner" style={{width:32,height:32,borderWidth:3}} />
        <p style={{color:"#555",fontSize:14}}>Cargando datos desde Google Drive…</p>
      </div>
    );
  }

  // ══════════════════════════════════════════
  //  MAIN UI
  // ══════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#0D0D0F"}}>

      {/* Sync bar */}
      <div className="sync-bar">
        <div className="sync-dot syncing" style={{background:syncColor}} />
        <span style={{color:syncState==="saved"?"#10B981":syncState==="error"?"#EF4444":"#F59E0B"}}>{syncLabel}</span>
        {userInfo && (
          <span style={{color:"#444",marginLeft:4}}>· {userInfo.email}</span>
        )}
        <span style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn-ghost" onClick={exportBackup} style={{padding:"3px 10px",fontSize:11}}>⬇ Exportar</button>
          <label className="btn-ghost" style={{padding:"3px 10px",fontSize:11,cursor:"pointer"}}>
            ⬆ Importar<input type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/>
          </label>
          {userInfo && (
            <button className="btn-ghost" onClick={signOut} style={{padding:"3px 10px",fontSize:11}}>Cerrar sesión</button>
          )}
        </span>
      </div>

      {/* Header */}
      <div style={{borderBottom:"1px solid #1E1E22",padding:"0 24px",display:"flex",alignItems:"center",gap:16,height:56,position:"sticky",top:0,background:"#0D0D0F",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginRight:8}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#F59E0B,#F97316)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🚗</div>
          <span style={{fontWeight:700,fontSize:16,letterSpacing:"-0.01em"}}>AutoLog</span>
        </div>
        <nav style={{display:"flex",gap:4,flex:1,overflowX:"auto"}}>
          {[["dashboard","📊 Inicio"],["addCar","🚗 Nuevo"],["addLog","➕ Registrar"],["history","📋 Historial"]].map(([v,lbl])=>(
            <button key={v} className={`nav-item ${view===v?"active":""}`} onClick={()=>setView(v)}>{lbl}</button>
          ))}
        </nav>
        <span style={{fontSize:12,color:"#444",fontFamily:"Space Mono",whiteSpace:"nowrap"}}>{data.cars.length} veh.</span>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"28px 20px"}}>

        {/* ─── DASHBOARD ─── */}
        {view==="dashboard" && (
          <div>
            {data.cars.length===0 ? (
              <div style={{textAlign:"center",padding:"80px 20px"}}>
                <div style={{fontSize:64,marginBottom:20}}>🚗</div>
                <h2 style={{fontSize:22,fontWeight:700,marginBottom:10}}>Sin vehículos registrados</h2>
                <p style={{color:"#555",marginBottom:28}}>Añade tu primer vehículo para comenzar.</p>
                <button className="btn-primary" onClick={()=>setView("addCar")}>+ Añadir Vehículo</button>
              </div>
            ) : (
              <div>
                <div style={{display:"flex",gap:10,marginBottom:28,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"#555",fontSize:13}}>Vehículo:</span>
                  {data.cars.map(car=>{
                    const active=selectedCar===car.id||(!selectedCar&&data.cars[0]?.id===car.id);
                    return (
                      <button key={car.id} onClick={()=>setSelectedCar(car.id)}
                        style={{padding:"8px 16px",borderRadius:10,border:"1px solid",borderColor:active?"#F59E0B":"#252528",
                                background:active?"#1E1A10":"transparent",color:active?"#F59E0B":"#888",
                                fontSize:14,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
                        {car.name} {car.year}
                      </button>
                    );
                  })}
                  <button className="btn-ghost" onClick={()=>setView("addCar")} style={{padding:"8px 14px",fontSize:13}}>+ Añadir</button>
                </div>

                {dashboardCar && (
                  <div>
                    <div className="card" style={{padding:"22px 24px",marginBottom:20,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                          <h2 style={{fontSize:22,fontWeight:700}}>{dashboardCar.name}</h2>
                          <span className="badge" style={{background:"#1E1E22",color:"#888"}}>{dashboardCar.year}</span>
                          <span className="plate">{dashboardCar.plate}</span>
                        </div>
                        {dashboardCar.color && <p style={{color:"#555",fontSize:13}}>Color: {dashboardCar.color}</p>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#555",fontSize:12,marginBottom:4,letterSpacing:"0.08em",textTransform:"uppercase"}}>Kilometraje</div>
                        <div className="km-display">{dashboardCar.km.toLocaleString("es-ES")} <span style={{fontSize:14,color:"#555"}}>km</span></div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button className="btn-primary" onClick={()=>{setForm({carId:String(dashboardCar.id)});setView("addLog");}} style={{fontSize:13,padding:"10px 16px"}}>+ Registrar</button>
                        <button className="delete-btn" onClick={()=>deleteCar(dashboardCar.id)}>🗑️</button>
                      </div>
                    </div>

                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
                      {TYPES.filter(t=>t.id!=="other").map(type=>{
                        const last    = getLastLog(dashboardCar.id, type.id);
                        const since   = last ? dashboardCar.km - last.km : null;
                        const overdue = type.interval && since!==null && since>=type.interval;
                        const dueSoon = type.interval && since!==null && since>=type.interval*.8 && !overdue;
                        const pct     = type.interval && since!==null ? Math.min(100,(since/type.interval)*100) : 0;
                        return (
                          <div key={type.id} className={`service-card ${overdue?"overdue":dueSoon?"due-soon":""}`}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                              <div>
                                <div style={{fontSize:22,marginBottom:4}}>{type.icon}</div>
                                <div style={{fontSize:13,fontWeight:600,color:"#D0D0D8"}}>{type.label}</div>
                              </div>
                              {overdue  && <span className="badge" style={{background:"#2A1010",color:"#EF4444"}}>VENCIDO</span>}
                              {dueSoon  && <span className="badge" style={{background:"#2A1E08",color:"#F59E0B"}}>PRÓXIMO</span>}
                              {!overdue&&!dueSoon&&last && <span className="badge" style={{background:"#0E1A12",color:"#10B981"}}>AL DÍA</span>}
                            </div>
                            {last ? (
                              <div>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#555",marginBottom:6}}>
                                  <span>Último: {fmtDate(last.date)}</span>
                                  <span>{last.km.toLocaleString("es-ES")} km</span>
                                </div>
                                {type.interval && (
                                  <div>
                                    <div style={{height:4,background:"#252528",borderRadius:4,overflow:"hidden",marginBottom:5}}>
                                      <div style={{height:"100%",width:`${pct}%`,background:overdue?"#EF4444":dueSoon?"#F59E0B":type.color,borderRadius:4,transition:"width .5s"}}/>
                                    </div>
                                    <div style={{fontSize:11,color:"#444"}}>{since?.toLocaleString("es-ES")} / {type.interval.toLocaleString("es-ES")} km</div>
                                  </div>
                                )}
                              </div>
                            ) : <div style={{fontSize:12,color:"#444"}}>Sin registros aún</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ─── ADD CAR ─── */}
        {view==="addCar" && (
          <div style={{maxWidth:480}}>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:24}}>🚗 Nuevo Vehículo</h2>
            <div className="card" style={{padding:28}}>
              <div style={{display:"grid",gap:16}}>
                <div>
                  <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Nombre / Modelo *</label>
                  <input className="input-field" placeholder="Toyota Camry" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Año *</label>
                    <input className="input-field" type="number" placeholder="2020" value={form.year||""} onChange={e=>setForm(f=>({...f,year:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Tablilla / Placa *</label>
                    <input className="input-field" placeholder="ABC-123" value={form.plate||""} onChange={e=>setForm(f=>({...f,plate:e.target.value.toUpperCase()}))}/>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Km Actuales</label>
                    <input className="input-field" type="number" placeholder="0" value={form.km||""} onChange={e=>setForm(f=>({...f,km:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Color</label>
                    <input className="input-field" placeholder="Azul" value={form.color||""} onChange={e=>setForm(f=>({...f,color:e.target.value}))}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,paddingTop:8}}>
                  <button className="btn-primary" onClick={addCar}>Añadir Vehículo</button>
                  <button className="btn-ghost" onClick={()=>{setForm({});setView("dashboard");}}>Cancelar</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ─── ADD LOG ─── */}
        {view==="addLog" && (
          <div style={{maxWidth:480}}>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:24}}>➕ Registrar Mantenimiento</h2>
            {data.cars.length===0 ? (
              <div className="card" style={{padding:32,textAlign:"center"}}>
                <p style={{color:"#555",marginBottom:20}}>Primero debes añadir un vehículo.</p>
                <button className="btn-primary" onClick={()=>setView("addCar")}>+ Añadir Vehículo</button>
              </div>
            ) : (
              <div className="card" style={{padding:28}}>
                <div style={{display:"grid",gap:16}}>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Vehículo *</label>
                    <select className="input-field" value={form.carId||""} onChange={e=>setForm(f=>({...f,carId:e.target.value}))}>
                      <option value="">Seleccionar vehículo...</option>
                      {data.cars.map(c=><option key={c.id} value={String(c.id)}>{c.name} {c.year} — {c.plate}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Tipo de Mantenimiento *</label>
                    <select className="input-field" value={form.type||""} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                      <option value="">Seleccionar...</option>
                      {TYPES.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
                    </select>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Fecha *</label>
                      <input className="input-field" type="date" value={form.date||""} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Kilometraje *</label>
                      <input className="input-field" type="number" placeholder="50000" value={form.km||""} onChange={e=>setForm(f=>({...f,km:e.target.value}))}/>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Costo (opcional)</label>
                      <input className="input-field" placeholder="$0.00" value={form.cost||""} onChange={e=>setForm(f=>({...f,cost:e.target.value}))}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Taller (opcional)</label>
                      <input className="input-field" placeholder="Taller Juan" value={form.shop||""} onChange={e=>setForm(f=>({...f,shop:e.target.value}))}/>
                    </div>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:"#666",display:"block",marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Notas (opcional)</label>
                    <input className="input-field" placeholder="Ej: Aceite sintético 5W-30..." value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
                  </div>
                  <div style={{display:"flex",gap:10,paddingTop:8}}>
                    <button className="btn-primary" onClick={addLog}>Guardar Registro</button>
                    <button className="btn-ghost" onClick={()=>{setForm({});setView("history");}}>Cancelar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── HISTORY ─── */}
        {view==="history" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
              <h2 style={{fontSize:20,fontWeight:700}}>📋 Historial de Mantenimiento</h2>
              <button className="btn-primary" onClick={()=>setView("addLog")} style={{fontSize:13,padding:"10px 16px"}}>+ Registrar</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              <select className="input-field" style={{width:"auto",flex:1,minWidth:160}} value={filterCar} onChange={e=>setFilterCar(e.target.value)}>
                <option value="all">Todos los vehículos</option>
                {data.cars.map(c=><option key={c.id} value={String(c.id)}>{c.name} {c.year}</option>)}
              </select>
              <select className="input-field" style={{width:"auto",flex:1,minWidth:180}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
                <option value="all">Todos los tipos</option>
                {TYPES.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
              </select>
            </div>
            {filteredLogs.length===0 ? (
              <div className="card" style={{padding:60,textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:16}}>📋</div>
                <p style={{color:"#555"}}>No hay registros aún.</p>
              </div>
            ) : (
              <div style={{display:"grid",gap:10}}>
                {filteredLogs.map(log=>{
                  const car  = getCarById(log.carId);
                  const type = getTypeById(log.type);
                  return (
                    <div key={log.id} className="card" style={{padding:"16px 20px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                      <div style={{fontSize:26,flexShrink:0}}>{type?.icon||"📝"}</div>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                          <span style={{fontWeight:600,fontSize:15}}>{type?.label||log.type}</span>
                          {car && <span className="plate">{car.plate}</span>}
                        </div>
                        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                          <span style={{color:"#555",fontSize:13}}>📅 {fmtDate(log.date)}</span>
                          <span style={{color:"#555",fontSize:13}}>🛣️ {parseInt(log.km).toLocaleString("es-ES")} km</span>
                          {log.shop && <span style={{color:"#555",fontSize:13}}>🔧 {log.shop}</span>}
                          {log.cost && <span style={{color:"#10B981",fontSize:13}}>💲 {log.cost}</span>}
                        </div>
                        {log.notes && <div style={{color:"#444",fontSize:12,marginTop:5}}>📝 {log.notes}</div>}
                      </div>
                      {car && <div style={{fontSize:12,color:"#444",textAlign:"right",flexShrink:0}}>{car.name} {car.year}</div>}
                      <button className="delete-btn" onClick={()=>deleteLog(log.id)}>🗑️</button>
                    </div>
                  );
                })}
              </div>
            )}
            {filteredLogs.length>0 && (
              <div style={{marginTop:16,color:"#444",fontSize:13,textAlign:"right"}}>
                {filteredLogs.length} {filteredLogs.length===1?"registro":"registros"}
                {filteredLogs.filter(l=>l.cost).length>0 && (
                  <span style={{marginLeft:12,color:"#10B981"}}>
                    Total: ${filteredLogs.filter(l=>l.cost).reduce((s,l)=>{
                      const n=parseFloat(l.cost.replace(/[^0-9.]/g,""));
                      return s+(isNaN(n)?0:n);
                    },0).toFixed(2)}
                  </span>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Toast */}
      {toast && (
        <div className="toast" style={{
          background:toast.type==="error"?"#2A1010":"#0E1A12",
          border:`1px solid ${toast.type==="error"?"#EF4444":"#10B981"}`,
          color:toast.type==="error"?"#EF4444":"#10B981",
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
