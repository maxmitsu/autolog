<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoLog — Mantenimiento de Vehículos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#0D0D0F; font-family:'DM Sans','Segoe UI',sans-serif; color:#E8E8EC; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#1A1A1E; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
    input,select,textarea { outline:none; }
    button { cursor:pointer; font-family:inherit; }
    .card { background:#16161A; border:1px solid #252528; border-radius:16px; transition:border-color .2s; }
    .card:hover { border-color:#353538; }
    .btn-primary { background:linear-gradient(135deg,#F59E0B,#F97316); color:#0D0D0F; border:none; border-radius:10px; padding:12px 24px; font-weight:700; font-size:14px; letter-spacing:.02em; transition:all .2s; }
    .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
    .btn-ghost { background:transparent; color:#888; border:1px solid #252528; border-radius:10px; padding:10px 18px; font-size:14px; font-weight:500; transition:all .2s; }
    .btn-ghost:hover { background:#1E1E22; color:#E8E8EC; border-color:#353538; }
    .input-field { width:100%; background:#1E1E22; border:1px solid #2A2A2E; border-radius:10px; padding:11px 14px; color:#E8E8EC; font-size:14px; font-family:inherit; transition:border-color .2s; }
    .input-field:focus { border-color:#F59E0B; }
    .input-field option { background:#1E1E22; }
    .nav-item { padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500; border:none; background:transparent; color:#666; transition:all .2s; white-space:nowrap; }
    .nav-item.active { background:#1E1E22; color:#F59E0B; }
    .nav-item:hover:not(.active) { color:#aaa; background:#1A1A1E; }
    .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.04em; }
    .service-card { background:#16161A; border:1px solid #252528; border-radius:14px; padding:14px; transition:all .2s; }
    .service-card:hover { border-color:#353538; transform:translateY(-1px); }
    .overdue  { border-color:#EF4444!important; background:#1A1010!important; }
    .due-soon { border-color:#F59E0B!important; background:#1A1610!important; }
    .toast { position:fixed; bottom:24px; right:24px; padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500; z-index:200; animation:slideIn .3s ease; box-shadow:0 8px 32px rgba(0,0,0,.5); max-width:320px; }
    @keyframes slideIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .plate { font-family:'Space Mono',monospace; font-size:11px; background:#252528; padding:3px 8px; border-radius:5px; letter-spacing:.08em; }
    .odo-display { font-family:'Space Mono',monospace; color:#F59E0B; font-size:22px; font-weight:700; }
    .delete-btn { background:transparent; border:none; color:#444; font-size:16px; padding:4px 8px; border-radius:6px; transition:all .2s; }
    .delete-btn:hover { color:#EF4444; background:#1A1010; }
    .login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
    .login-logo { width:72px; height:72px; background:linear-gradient(135deg,#F59E0B,#F97316); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 24px; box-shadow:0 0 40px rgba(245,158,11,.3); }
    .login-card { background:#16161A; border:1px solid #252528; border-radius:20px; padding:40px; max-width:400px; width:100%; }
    .gdrive-btn { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:14px 24px; background:#fff; color:#333; border:none; border-radius:10px; font-size:15px; font-weight:600; transition:all .2s; margin-top:8px; }
    .gdrive-btn:hover { background:#f5f5f5; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#333; font-size:13px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#252528; }
    .sync-bar { background:#111115; border-bottom:1px solid #1E1E22; padding:5px 20px; display:flex; align-items:center; gap:10px; font-size:12px; color:#555; flex-wrap:wrap; min-height:34px; }
    .sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .syncing { animation:pulse 1s infinite; }
    .spinner { width:18px; height:18px; border:2px solid #333; border-top-color:#F59E0B; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Unit toggle */
    .unit-toggle { display:flex; background:#1A1A1E; border-radius:8px; padding:3px; gap:2px; }
    .unit-btn { padding:5px 12px; border-radius:6px; border:none; font-size:12px; font-weight:600; transition:all .2s; }
    .unit-btn.active { background:#F59E0B; color:#0D0D0F; }
    .unit-btn:not(.active) { background:transparent; color:#555; }

    /* Alert banner */
    .alert-banner { border-radius:12px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; }
    .alert-banner.danger { background:#1A1010; border:1px solid #EF4444; }
    .alert-banner.warning { background:#1A1610; border:1px solid #F59E0B; }
    .alert-list { list-style:none; display:flex; flex-direction:column; gap:4px; }
    .alert-list li { font-size:13px; }

    /* Reminder badge on nav */
    .alert-dot { width:8px; height:8px; background:#EF4444; border-radius:50%; display:inline-block; margin-left:5px; vertical-align:middle; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const CLIENT_ID  = "485276099955-j1lh6aretg8i901km60m32kauroqaosu.apps.googleusercontent.com";
const SCOPES     = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME  = "autolog-data.json";
const EMPTY_DATA = { cars:[], logs:[], settings:{ unit:"mi" }, reminders:[] };

// ── Drive helpers ──────────────────────────────
async function driveReq(url, opts={}) {
  const res = await fetch(url, { ...opts, headers:{ Authorization:`Bearer ${window._gdrive_token}`, ...opts.headers } });
  if (!res.ok) throw new Error(`Drive ${res.status}`);
  return res;
}
async function findFile() {
  const r = await driveReq(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`);
  const d = await r.json(); return d.files?.[0] || null;
}
async function readFile(id) { return (await driveReq(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`)).json(); }
async function createFile(content) {
  const meta = new Blob([JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})],{type:"application/json"});
  const body = new Blob([JSON.stringify(content)],{type:"application/json"});
  const form = new FormData(); form.append("metadata",meta); form.append("file",body);
  return (await driveReq("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",body:form})).json();
}
async function updateFile(id, content) {
  await driveReq(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
    {method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(content)});
}

// ── Maintenance types (intervals in MILES) ────
const TYPES = [
  { id:"oil",          label:"Oil Change",           icon:"🛢️", color:"#F59E0B", intervalMi:5000,  intervalKm:8000  },
  { id:"filter",       label:"Air Filter",           icon:"🔧", color:"#6366F1", intervalMi:15000, intervalKm:24000 },
  { id:"tires",        label:"Tire Rotation",        icon:"⚙️", color:"#10B981", intervalMi:7500,  intervalKm:12000 },
  { id:"brakes",       label:"Brake Inspection",     icon:"🔴", color:"#EF4444", intervalMi:20000, intervalKm:32000 },
  { id:"transmission", label:"Transmission Fluid",   icon:"⚡", color:"#8B5CF6", intervalMi:30000, intervalKm:48000 },
  { id:"coolant",      label:"Coolant Flush",        icon:"💧", color:"#0EA5E9", intervalMi:40000, intervalKm:64000 },
  { id:"battery",      label:"Battery Check",        icon:"🔋", color:"#F97316", intervalMi:50000, intervalKm:80000 },
  { id:"alignment",    label:"Wheel Alignment",      icon:"📐", color:"#EC4899", intervalMi:15000, intervalKm:24000 },
  { id:"ac",           label:"A/C Service",          icon:"❄️", color:"#06B6D4", intervalMi:25000, intervalKm:40000 },
  { id:"wipers",       label:"Wiper Blades",         icon:"🌧️", color:"#84CC16", intervalMi:12000, intervalKm:19000 },
  { id:"other",        label:"Other",                icon:"📝", color:"#78716C", intervalMi:null,  intervalKm:null  },
];

function fmtDate(s) {
  if (!s) return "—";
  return new Date(s+"T00:00:00").toLocaleDateString("en-US",{day:"2-digit",month:"short",year:"numeric"});
}
function daysBetween(d1, d2) {
  return Math.floor((new Date(d2) - new Date(d1)) / 86400000);
}
function today() { return new Date().toISOString().slice(0,10); }

// ══════════════════════════════════════════════
function App() {
  const [authState,   setAuthState]   = useState("idle");
  const [userInfo,    setUserInfo]    = useState(null);
  const tokenClient   = useRef(null);
  const tokenRef      = useRef(null);

  const [data,        setData]        = useState(EMPTY_DATA);
  const [fileId,      setFileId]      = useState(null);
  const [syncState,   setSyncState]   = useState("idle");
  const [lastSync,    setLastSync]    = useState(null);
  const saveTimer     = useRef(null);
  const fileIdRef     = useRef(null);
  fileIdRef.current   = fileId;
  const isFirst       = useRef(true);

  const [view,        setView]        = useState("dashboard");
  const [selectedCar, setSelectedCar] = useState(null);
  const [form,        setForm]        = useState({});
  const [filterCar,   setFilterCar]   = useState("all");
  const [filterType,  setFilterType]  = useState("all");
  const [toast,       setToast]       = useState(null);

  const unit = data.settings?.unit || "mi";
  const setUnit = (u) => setData(d=>({...d, settings:{...d.settings, unit:u}}));
  const unitLabel = unit==="mi" ? "mi" : "km";
  const getInterval = (type) => unit==="mi" ? type.intervalMi : type.intervalKm;
  const fmtOdo = (n) => n!=null ? parseInt(n).toLocaleString("en-US") : "—";

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  // ── Auth ──────────────────────────────────
  useEffect(()=>{
    const iv = setInterval(()=>{
      if (window.google?.accounts?.oauth2) {
        clearInterval(iv);
        tokenClient.current = window.google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID, scope: SCOPES, callback: handleToken,
        });
      }
    },300);
    return ()=>clearInterval(iv);
  },[]);

  const handleToken = async (resp) => {
    if (resp.error) { setAuthState("error"); return; }
    window._gdrive_token = resp.access_token;
    tokenRef.current = resp.access_token;
    try {
      const ui = await fetch("https://www.googleapis.com/oauth2/v3/userinfo",
        {headers:{Authorization:`Bearer ${resp.access_token}`}}).then(r=>r.json());
      setUserInfo(ui);
    } catch {}
    setAuthState("loading");
    await loadDrive();
  };

  const signIn  = () => tokenClient.current?.requestAccessToken();
  const signOut = () => {
    if (tokenRef.current) window.google?.accounts?.oauth2?.revoke(tokenRef.current);
    window._gdrive_token = null; tokenRef.current = null;
    setUserInfo(null); setAuthState("idle"); setData(EMPTY_DATA); setFileId(null);
    showToast("Signed out");
  };

  const loadDrive = async () => {
    try {
      setSyncState("saving");
      const file = await findFile();
      if (file) {
        const content = await readFile(file.id);
        // migrate old data that might not have settings/reminders
        setData({...EMPTY_DATA, ...content, settings:{unit:"mi",...content.settings}, reminders:content.reminders||[]});
        setFileId(file.id); fileIdRef.current = file.id;
      } else {
        const created = await createFile(EMPTY_DATA);
        setFileId(created.id); fileIdRef.current = created.id;
      }
      setLastSync(new Date()); setSyncState("saved"); setAuthState("authed");
    } catch(e) {
      console.error(e); setSyncState("error"); setAuthState("authed");
      showToast("Error loading from Drive","error");
    }
  };

  const saveDrive = useCallback(async(newData)=>{
    if (!fileIdRef.current) return;
    setSyncState("saving");
    try { await updateFile(fileIdRef.current, newData); setLastSync(new Date()); setSyncState("saved"); }
    catch { setSyncState("error"); }
  },[]);

  useEffect(()=>{
    if (isFirst.current) { isFirst.current=false; return; }
    if (!fileIdRef.current) { try { localStorage.setItem("autolog_data",JSON.stringify(data)); } catch {} return; }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>saveDrive(data),1200);
  },[data]);

  useEffect(()=>{
    if (authState==="idle") {
      try { const s=localStorage.getItem("autolog_data"); if(s) setData({...EMPTY_DATA,...JSON.parse(s)}); } catch {}
    }
  },[]);

  // ── Alerts computation ────────────────────
  const alerts = useMemo(()=>{
    const overdue=[], dueSoon=[], dateAlerts=[];
    data.cars.forEach(car=>{
      TYPES.filter(t=>t.id!=="other").forEach(type=>{
        const last = data.logs.filter(l=>l.carId===String(car.id)&&l.type===type.id)
                              .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        const interval = getInterval(type);
        if (!interval) return;
        const since = last ? car.odo - last.odo : null;
        if (since !== null) {
          if (since >= interval) overdue.push({car, type, since, interval});
          else if (since >= interval*0.8) dueSoon.push({car, type, since, interval});
        }
      });
    });
    // Date-based reminders
    const todayStr = today();
    data.reminders?.forEach(rem=>{
      const car = data.cars.find(c=>c.id===parseInt(rem.carId));
      if (!car) return;
      const days = daysBetween(todayStr, rem.date);
      if (days <= 0) dateAlerts.push({...rem, car, days, overdue:true});
      else if (days <= 7) dateAlerts.push({...rem, car, days, overdue:false});
    });
    return { overdue, dueSoon, dateAlerts, total: overdue.length+dueSoon.length+dateAlerts.length };
  },[data, unit]);

  // ── CRUD ──────────────────────────────────
  const addCar = () => {
    if (!form.name||!form.year||!form.plate) return showToast("Fill in all required fields","error");
    const car = { id:Date.now(), ...form, odo:parseInt(form.odo)||0 };
    setData(d=>({...d, cars:[...d.cars, car]}));
    setForm({}); setView("dashboard");
    showToast(`${car.name} added ✓`);
  };

  const addLog = () => {
    if (!form.carId||!form.type||!form.date||!form.odo) return showToast("Fill in all required fields","error");
    const log = { id:Date.now(), ...form, odo:parseInt(form.odo) };
    setData(d=>({
      ...d,
      cars: d.cars.map(c=>c.id===parseInt(form.carId)?{...c,odo:Math.max(c.odo,parseInt(form.odo))}:c),
      logs: [log,...d.logs],
    }));
    setForm({}); setView("history");
    showToast("Service logged ✓");
  };

  const addReminder = () => {
    if (!form.remCarId||!form.remDate||!form.remNote) return showToast("Fill in all fields","error");
    const rem = { id:Date.now(), carId:form.remCarId, date:form.remDate, note:form.remNote };
    setData(d=>({...d, reminders:[...(d.reminders||[]), rem]}));
    setForm({}); showToast("Reminder saved ✓");
  };

  const deleteReminder = (id) => setData(d=>({...d, reminders:d.reminders.filter(r=>r.id!==id)}));

  const deleteCar = (id) => {
    if (!confirm("Delete this vehicle and all its records?")) return;
    setData(d=>({...d, cars:d.cars.filter(c=>c.id!==id), logs:d.logs.filter(l=>l.carId!==String(id))}));
    if (selectedCar===id) setSelectedCar(null);
    showToast("Vehicle deleted");
  };

  const deleteLog = (id) => { setData(d=>({...d, logs:d.logs.filter(l=>l.id!==id)})); showToast("Record deleted"); };

  const exportBackup = () => {
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`autolog-backup-${today()}.json`; a.click();
  };

  const importBackup = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ try { const d=JSON.parse(ev.target.result); if(!d.cars||!d.logs) throw new Error(); setData({...EMPTY_DATA,...d}); showToast("Backup imported ✓"); } catch { showToast("Invalid file","error"); } };
    r.readAsText(file); e.target.value="";
  };

  const getCarById  = id => data.cars.find(c=>c.id===parseInt(id));
  const getTypeById = id => TYPES.find(t=>t.id===id);
  const getLastLog  = (carId,typeId) =>
    data.logs.filter(l=>l.carId===String(carId)&&l.type===typeId)
             .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  const filteredLogs = data.logs.filter(l=>{
    if(filterCar!=="all"&&l.carId!==filterCar) return false;
    if(filterType!=="all"&&l.type!==filterType) return false;
    return true;
  });

  const dashboardCar = selectedCar ? getCarById(selectedCar) : data.cars[0];
  const fmtTime = d => d?d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";
  const syncColor = syncState==="saved"?"#10B981":syncState==="saving"?"#F59E0B":"#EF4444";
  const syncLabel = syncState==="saved"?`☁️ Saved · ${fmtTime(lastSync)}`:syncState==="saving"?"☁️ Saving…":"⚠️ Save error";

  // ══════════════════════════════════════════
  //  LOGIN
  // ══════════════════════════════════════════
  if (authState==="idle"||authState==="error") return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">🚗</div>
        <h1 style={{fontSize:26,fontWeight:700,marginBottom:8}}>AutoLog</h1>
        <p style={{color:"#555",fontSize:14,marginBottom:28,lineHeight:1.6}}>Vehicle maintenance tracker.<br/>Synced with Google Drive.</p>
        {authState==="error"&&<div style={{background:"#2A1010",border:"1px solid #EF4444",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#EF4444"}}>⚠️ Connection error. Try again.</div>}
        <button className="gdrive-btn" onClick={signIn}>
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
        <div className="divider">or</div>
        <button className="btn-ghost" style={{width:"100%",textAlign:"center"}} onClick={()=>setAuthState("authed")}>
          Use without account (local only)
        </button>
        <p style={{color:"#333",fontSize:11,marginTop:20,lineHeight:1.6}}>Data is stored privately in your Google Drive. No one else can access it.</p>
      </div>
    </div>
  );

  if (authState==="loading") return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div className="spinner" style={{width:32,height:32,borderWidth:3}}/>
      <p style={{color:"#555",fontSize:14}}>Loading from Google Drive…</p>
    </div>
  );

  // ══════════════════════════════════════════
  //  MAIN UI
  // ══════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#0D0D0F"}}>

      {/* Sync bar */}
      <div className="sync-bar">
        <div className="sync-dot syncing" style={{background:syncColor}}/>
        <span style={{color:syncColor}}>{syncLabel}</span>
        {userInfo&&<span style={{color:"#444"}}>· {userInfo.email}</span>}
        <span style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {/* Unit toggle */}
          <div className="unit-toggle">
            <button className={`unit-btn ${unit==="mi"?"active":""}`} onClick={()=>setUnit("mi")}>Miles</button>
            <button className={`unit-btn ${unit==="km"?"active":""}`} onClick={()=>setUnit("km")}>KM</button>
          </div>
          <button className="btn-ghost" onClick={exportBackup} style={{padding:"3px 10px",fontSize:11}}>⬇ Export</button>
          <label className="btn-ghost" style={{padding:"3px 10px",fontSize:11,cursor:"pointer"}}>
            ⬆ Import<input type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/>
          </label>

              ) : (
                <div style={{display:"grid",gap:8}}>
                  {[...(data.reminders||[])].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(rem=>{
                    const car=getCarById(rem.carId);
                    const days=daysBetween(today(),rem.date);
                    const isPast=days<0;
                    const isSoon=days>=0&&days<=7;
                    return (
                      <div key={rem.id} className="card" style={{padding:"12px 16px",display:"flex",gap:12,alignItems:"center",
                        borderColor:isPast?"#EF4444":isSoon?"#F59E0B":"#252528",
                        background:isPast?"#1A1010":isSoon?"#1A1610":"#16161A"}}>
                        <span style={{fontSize:20}}>📅</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:13}}>{rem.note}</div>
                          <div style={{fontSize:12,color:"#555",marginTop:2}}>
                            {car?.name} {car?.year} · {fmtDate(rem.date)}
                            <span style={{marginLeft:8,color:isPast?"#EF4444":isSoon?"#F59E0B":"#555"}}>
                              {isPast?`${Math.abs(days)} day${Math.abs(days)!==1?"s":""} overdue`:days===0?"Today!":days===1?"Tomorrow":`In ${days} days`}
                            </span>
                          </div>
                        </div>
                        <button className="delete-btn" onClick={()=>deleteReminder(rem.id)}>🗑️</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {toast&&(
        <div className="toast" style={{
          background:toast.type==="error"?"#2A1010":"#0E1A12",
          border:`1px solid ${toast.type==="error"?"#EF4444":"#10B981"}`,
          color:toast.type==="error"?"#EF4444":"#10B981",
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
